<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domerlo — Soon</title>
  <meta name="description" content="Domerlo — Soon">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; }
    body {
      margin: 0;
      min-height: 100svh;
      background: #ffffff;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }
    .logo {
      display: block;
      width: min(320px, 70vw);
      max-height: 55vh;
      object-fit: contain;
    }
    .soon {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(28px, env(safe-area-inset-bottom));
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <img class="logo" src="logo.png.jpg" alt="Domerlo">
  <div class="soon">Soon</div>
</body>
</html>
